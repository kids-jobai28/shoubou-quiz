const PAID_Q = {

    {cat:"構造・機能", type:"", q:"【有料】二酸化炭素消火器の消火効果として正しいものはどれか？", choices:["冷却効果のみ","窒息効果と冷却効果","抑制効果のみ","浸透効果と冷却効果"], ans:1, exp:"CO₂消火器は気化による窒息効果と冷却効果の両方を発揮します。電気火災にも有効です。"},
    {cat:"法令", type:"", q:"【有料】スプリンクラー設備がある場合の消火器設置個数の扱いとして正しいものはどれか？", choices:["設置免除","1/3まで減少可","1/2まで減少可","変わらない"], ans:2, exp:"スプリンクラー設備等が設置されている部分は消火器の設置個数を1/2まで減少することができます。"},
  ],
  "甲4・乙7": [
    {cat:"構造・機能", type:"甲4", q:"【有料】煙感知器の設置が義務付けられる場所として正しいものはどれか？", choices:["ボイラー室","廊下・通路","厨房","駐車場"], ans:1, exp:"廊下・通路・階段などの避難経路には煙感知器の設置が義務付けられています。"},
    {cat:"法令", type:"甲4", q:"【有料】自動火災報知設備の警戒区域の面積の原則として正しいものはどれか？", choices:["300㎡以下","500㎡以下","600㎡以下","1000㎡以下"], ans:2, exp:"警戒区域の面積は原則として600㎡以下で、一辺の長さが50m以下とされています。"},
    {cat:"構造・機能", type:"乙7", q:"【有料】漏電火災警報器の変流器（ZCT）の役割として正しいものはどれか？", choices:["電圧を変換する","漏洩電流を検出する","電流を増幅する","接地抵抗を測定する"], ans:1, exp:"変流器（ZCT：零相変流器）は電路の漏洩電流を検出し、その信号を受信機に送ります。"},
    {cat:"法令", type:"乙7", q:"【有料】漏電火災警報器の受信機の設置場所として正しいものはどれか？", choices:["点検しやすく火災等の被害を受けにくい場所","最上階","屋外","地下室"], ans:0, exp:"受信機は点検しやすく、かつ火災等の災害による被害を受けるおそれが少ない箇所に設置します。"},
  ],
  "甲5": [
    {cat:"構造・機能", type:"", q:"【有料】金属製避難はしごの縦棒の間隔として正しいものはどれか？", choices:["20cm以上30cm以下","25cm以上35cm以下","30cm以上50cm以下","35cm以上55cm以下"], ans:1, exp:"金属製避難はしごの縦棒の内側の間隔は25cm以上35cm以下と定められています。"},
    {cat:"法令", type:"", q:"【有料】避難器具を2個以上設置する収容人員の条件として正しいものはどれか（特定用途の場合）？", choices:["100人以上","200人以上","300人以上","500人以上"], ans:1, exp:"収容人員が200人以上（特定用途の場合）などの条件で避難器具を2個以上設置する必要があります。"},
  ],
  "甲1": [
    {cat:"構造・機能", type:"", q:"【有料】湿式スプリンクラー設備と乾式の違いとして正しいものはどれか？", choices:["湿式は配管内が水で満たされている","乾式は配管内が水で満たされている","湿式は寒冷地向け","乾式は感知が速い"], ans:0, exp:"湿式は常時配管内が加圧水で満たされており、ヘッド開放で即放水します。乾式は加圧空気（窒素）で充填され寒冷地向けです。"},
    {cat:"法令", type:"", q:"【有料】屋内消火栓設備の水源水量（1号消火栓・最大2基同時使用）として正しいものはどれか？", choices:["1.2㎥以上","2.4㎥以上","5.2㎥以上","7.8㎥以上"], ans:2, exp:"1号消火栓は1基あたり2.6㎥（150L/min×30分）、最大2基同時で5.2㎥以上の水源が必要です。"},
  ],
  "甲2": [
    {cat:"構造・機能", type:"", q:"【有料】泡消火設備の一斉開放弁の役割として正しいものはどれか？", choices:["ポンプを起動する","区画全体に一斉に泡を放出する","薬剤を混合する","圧力を調整する"], ans:1, exp:"一斉開放弁（デリュージバルブ）は感知器の信号を受けて開放し、区画全体のヘッドから一斉に泡を放出させます。"},
    {cat:"法令", type:"", q:"【有料】フォームヘッド1個あたりの放射量として正しいものはどれか？", choices:["30L/min以上","50L/min以上","75L/min以上","100L/min以上"], ans:0, exp:"フォームヘッド1個あたりの放射量は30L/min以上とされています。"},
  ],
  "甲3": [
    {cat:"構造・機能", type:"", q:"【有料】IG-541（イナージェン）の成分として正しいものはどれか？", choices:["窒素52%・アルゴン40%・CO₂8%","窒素50%・アルゴン50%","窒素40%・アルゴン40%・CO₂20%","窒素100%"], ans:0, exp:"IG-541（イナージェン）は窒素52%・アルゴン40%・二酸化炭素8%の混合ガスです。"},
    {cat:"法令", type:"", q:"【有料】不活性ガス消火設備の放出表示灯の設置場所として正しいものはどれか？", choices:["防護区画の内部","防護区画の出入口付近の外側","受信機の近く","ガス容器の近く"], ans:1, exp:"放出表示灯は防護区画の出入口付近の外側に設置し、ガス放出中であることを警告します。"},
  ],
};

const FREE_TYPES = Object.keys(FREE_Q);
const PAID_TYPES = Object.keys(PAID_Q);

let zone = "free";
let currentType = "基礎知識";
let currentIdx = 0;
let answered = [];
let score = 0;
let unlockedTypes = new Set();
let pwError = "";

function getQs(){ return zone === "free" ? (FREE_Q[currentType]||[]) : (PAID_Q[currentType]||[]); }

function switchZone(z){
  zone = z;
  currentType = z === "free" ? "基礎知識" : PAID_TYPES[0];
  currentIdx = 0; answered = []; score = 0; pwError = "";
  render();
}

function switchType(t){ currentType = t; currentIdx = 0; answered = []; score = 0; render(); }

function render(){
  document.getElementById("zoneTabs").querySelectorAll(".ztab").forEach((b,i)=>{
    b.className = "ztab";
    if(i===0 && zone==="free") b.classList.add("active-free");
    if(i===1 && zone==="paid") b.classList.add("active-paid");
  });
  zone === "free" ? renderFree() : renderPaid();
}

function renderFree(){
  const tabsHtml = FREE_TYPES.map(t =>
    `<button class="ttab${t===currentType?' active':''}" onclick="switchType('${t}')">${t}</button>`
  ).join("");
  const qs = getQs();
  const total = qs.length;
  const allDone = answered.length===total && answered.every(a=>a!==null);
  const content = (allDone && currentIdx===total-1 && answered[currentIdx]!==null)
    ? renderResult("free", qs) : renderQuestion("free", qs);
  document.getElementById("mainArea").innerHTML = `
    <div class="type-tabs">${tabsHtml}</div>
    <div class="prog-bar"><div class="prog-fill" style="width:${total?Math.round(((currentIdx+1)/total)*100):0}%"></div></div>
    <div class="meta"><span class="meta-l">問題 ${currentIdx+1} / ${total}</span><span class="score-badge score-free">正解 ${score}問</span></div>
    ${content}
  `;
}

function renderPaid(){
  const tabsHtml = PAID_TYPES.map(t => {
    const ul = unlockedTypes.has(t)||unlockedTypes.has("ALL");
    return `<button class="ttab${ul?' unlocked':''}${t===currentType?' active':''}" onclick="switchPaidType('${t}')">${t} ${ul?'🔓':'🔒'}</button>`;
  }).join("");
  const isUnlocked = unlockedTypes.has(currentType)||unlockedTypes.has("ALL");
  let content = "";
  if(!isUnlocked){
    content = renderPwForm();
  } else {
    const qs = getQs();
    const total = qs.length;
    const allDone = answered.length===total && answered.every(a=>a!==null);
    const qContent = (allDone && currentIdx===total-1 && answered[currentIdx]!==null)
      ? renderResult("paid", qs)
      : `<div class="prog-bar"><div class="prog-fill paid" style="width:${total?Math.round(((currentIdx+1)/total)*100):0}%"></div></div>
         <div class="meta"><span class="meta-l">問題 ${currentIdx+1} / ${total}</span><span class="score-badge score-paid">正解 ${score}問</span></div>
         ${renderQuestion("paid", qs)}`;
    content = `<div class="unlocked-banner">🔓 ${currentType} 有料版 — 解放済み</div>${qContent}`;
  }
  document.getElementById("mainArea").innerHTML = `<div class="type-tabs">${tabsHtml}</div>${content}`;
}

function switchPaidType(t){ currentType=t; currentIdx=0; answered=[]; score=0; pwError=""; renderPaid(); }

function renderPwForm(){
  return `
    <div class="pw-card">
      <p class="pw-title">🔒 ${currentType} 有料版</p>
      <p class="pw-sub">noteの${currentType}類攻略記事（またはセット記事）を<br>購入するとパスワードが記載されています。</p>
      <div class="pw-input-row">
        <input type="password" id="pwInput" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')submitPw()">
        <button onclick="submitPw()">解放する</button>
      </div>
      ${pwError?`<p class="pw-err">❌ ${pwError}</p>`:""}
      <p style="margin-top:1.25rem;font-size:12px;color:#a1a1aa">セット購入パスワードで全類を一括解放できます</p>
    </div>
  `;
}

function submitPw(){
  const val = document.getElementById("pwInput").value.trim();
  if(val===PASSWORDS["SET"]){
    PAID_TYPES.forEach(t=>unlockedTypes.add(t)); unlockedTypes.add("ALL");
    pwError=""; answered=[]; score=0; currentIdx=0; renderPaid();
  } else if(PASSWORDS[currentType]&&val===PASSWORDS[currentType]){
    unlockedTypes.add(currentType);
    pwError=""; answered=[]; score=0; currentIdx=0; renderPaid();
  } else {
    pwError="パスワードが違います。noteの記事をご確認ください。"; renderPaid();
  }
}

function renderQuestion(z, qs){
  if(!qs||qs.length===0) return `<div class="q-card"><p class="q-text" style="color:#a1a1aa">問題データを準備中です。</p></div>`;
  const q = qs[currentIdx];
  const isAnswered = answered[currentIdx]!==undefined && answered[currentIdx]!==null;
  const isLast = currentIdx===qs.length-1;
  const btnClass = z==="free"?"primary-free":"primary-paid";
  const typeTag = q.type?`<span class="type-tag">${q.type}</span>`:"";
  const choicesHtml = q.choices.map((c,i)=>{
    let cls="c-btn";
    if(isAnswered){ if(i===q.ans) cls+=" correct"; else if(i===answered[currentIdx]) cls+=" wrong"; }
    return `<button class="${cls}" onclick="answer(${i})" ${isAnswered?"disabled":""}>${i+1}. ${c}</button>`;
  }).join("");
  const noteUrl = NOTE_URLS[currentType]||"https://note.com";
  const expHtml = isAnswered?`
    <div class="exp-box">${q.exp}</div>
    ${z==="free"?`<div class="note-cta">📖 <span>${currentType}の詳しい攻略はnoteで → <a class="note-link" href="${noteUrl}" target="_blank" rel="noopener">攻略記事を読む</a></span></div>`:""}
  `:"";
  const navHtml = isAnswered?`
    <div class="nav-row">
      <button class="nav-btn" onclick="prevQ()" ${currentIdx===0?"disabled":""}>← 前へ</button>
      <button class="nav-btn ${btnClass}" onclick="${isLast?"showResult()":"nextQ()"}">${isLast?"結果を見る":"次の問題 →"}</button>
    </div>
  `:"";
  return `<div class="q-card"><span class="cat-tag">${q.cat}</span>${typeTag}<p class="q-text">${q.q}</p><div class="choices">${choicesHtml}</div>${expHtml}</div>${navHtml}`;
}

function answer(i){
  if(answered[currentIdx]!==undefined&&answered[currentIdx]!==null) return;
  const qs=getQs();
  if(answered.length<=currentIdx) answered.length=currentIdx+1;
  answered[currentIdx]=i;
  if(i===qs[currentIdx].ans) score++;
  render();
}

function nextQ(){ currentIdx++; render(); }
function prevQ(){ if(currentIdx>0){ currentIdx--; render(); } }
function showResult(){ render(); }

function renderResult(z, qs){
  const total=qs.length;
  const pct=Math.round((score/total)*100);
  const msg=pct>=80?"すばらしい！合格ラインを上回っています。":pct>=60?"もう少し！苦手分野を重点的に復習しましょう。":"基礎から復習が必要です。note記事で一緒に学びましょう。";
  const cls=z==="free"?"free":"paid";
  const noteUrl=NOTE_URLS[currentType]||"https://note.com";
  const roadmapUrl=NOTE_URLS["ロードマップ"]||"https://note.com";
  const ctaHtml=z==="free"
    ?`<div class="result-cta free"><div class="result-cta-title free">📖 noteで詳しく学ぶ</div><a class="result-link" href="${noteUrl}" target="_blank" rel="noopener">・${currentType} 完全攻略記事</a><a class="result-link" href="${roadmapUrl}" target="_blank" rel="noopener">・取得ロードマップ（乙6→甲3）</a></div>`
    :`<div class="result-cta paid"><div class="result-cta-title paid">有料版クリア！他の類も挑戦してみましょう。</div></div>`;
  return `
    <div class="result-wrap">
      <div class="result-num ${cls}">${score}<span style="font-size:20px;color:#71717a"> / ${total}</span></div>
      <div class="result-lbl">正解率 ${pct}%</div>
      <div class="result-msg">${msg}</div>
      ${ctaHtml}
      <button class="nav-btn ${z==="free"?"primary-free":"primary-paid"}" style="margin-top:1rem;width:100%;max-width:300px" onclick="resetQuiz()">もう一度挑戦する</button>
    </div>
  `;
}

function resetQuiz(){ currentIdx=0; answered=[]; score=0; render(); }

render();
</script>
</body>
</html>
